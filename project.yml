name: BlixtSnap
options:
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  bundleIdPrefix: com.blixtsnap

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.1

targets:
  BlixtSnap:
    type: application
    platform: macOS
    sources:
      - BlixtSnap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blixtsnap.BlixtSnap
        INFOPLIST_FILE: BlixtSnap/Info.plist
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_NAME: BlixtSnap
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
    entitlements:
      path: BlixtSnap/BlixtSnap.entitlements
      properties:
        com.apple.security.app-sandbox: false
    dependencies:
      - package: HotKey
